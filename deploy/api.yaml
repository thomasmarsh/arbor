apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbo-api
  namespace: wc-apps-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arbo-api
  template:
    metadata:
      labels:
        app: arbo-api
    spec:
      containers:
        - name: arbo-api
          image: <sonatype-registry>/arbo-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: "3001"
          envFrom:
            - secretRef:
                name: arbo-api-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: arbo-api
  namespace: wc-apps-dev
spec:
  selector:
    app: arbo-api
  ports:
    - port: 3001
      targetPort: 3001
  # No Route — only reachable from within the cluster
