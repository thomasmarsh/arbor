apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbor-bff
  namespace: wc-apps-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arbor-bff
  template:
    metadata:
      labels:
        app: arbor-bff
    spec:
      containers:
        - name: arbor-bff
          image: <sonatype-registry>/arbor-bff:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: ARBOR_AUTH_DISABLED
              value: "false"
            - name: ARBOR_OIDC_ISSUER
              value: https://your-ad-idp.example.com
            - name: ARBOR_OIDC_CLIENT_ID
              value: arbor-bff
            - name: ARBOR_OIDC_REDIRECT_URI
              value: https://arbor.wc-apps-dev.example.com/auth/callback
            - name: ARBOR_APP_URL
              value: https://arbor.wc-apps-dev.example.com
            - name: ARBOR_BFF_URL
              value: https://arbor.wc-apps-dev.example.com
            - name: ARBOR_API_URL
              value: http://arbor-api:3001
            - name: BFF_PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: arbor-bff-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: arbor-bff
  namespace: wc-apps-dev
spec:
  selector:
    app: arbor-bff
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: arbor-bff
  namespace: wc-apps-dev
spec:
  host: arbor.wc-apps-dev.example.com
  to:
    kind: Service
    name: arbor-bff
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
