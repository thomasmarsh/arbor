name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    env:
      TURBO_TELEMETRY_DISABLED: 1
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arbor
          POSTGRES_PASSWORD: arbor
          POSTGRES_DB: arbor_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create env files
        run: |
          cp apps/api/.env.example apps/api/.env.local
          echo "ARBOR_PG_URL=postgresql://arbor:arbor@localhost:5433/arbor_dev" >> apps/api/.env.local

      - name: Migrate database
        run: pnpm --filter @arbor/api db:migrate
        env:
          ARBOR_PG_URL: postgresql://arbor:arbor@localhost:5433/arbor_dev

      - name: Generate database types
        run: pnpm --filter @arbor/api db:generate

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest
          path: '**/test-results/junit.xml'
          reporter: java-junit

      - name: Install lcov
        if: always()
        run: sudo apt-get install -y -qq lcov

      - name: Merge coverage reports
        if: always()
        run: |
          args=""
          while IFS= read -r f; do
            args="$args -a $f"
          done < <(find . -path "*/coverage/lcov.info" -not -path "*/node_modules/*")
          if [ -n "$args" ]; then
            mkdir -p coverage
            lcov --ignore-errors empty $args -o coverage/lcov.info
          fi

      - name: Coverage report
        uses: romeovs/lcov-reporter-action@v0.4.0
        if: github.event_name == 'pull_request'
        with:
          lcov-file: coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
